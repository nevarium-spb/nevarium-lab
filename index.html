<html lang="ru">

    <meta charset="UTF-8" />

    <meta name="theme-color" content="#0d1030" />
    <script>
      // Тема до первой отрисовки — без мигания
      (function () {
        try {
          var t = localStorage.getItem('nevarium-theme');
          document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta
      name="description"

    />
    <meta property="og:title" content="Невариум ЛАБ ИИ — внедряем ИИ в бизнес. Измеримо." />

      property="og:description"
      content="GPT-ассистенты под ключ, чат-боты для продаж, ИИ-контент и автоматизация. Первый аудит — бесплатно."
